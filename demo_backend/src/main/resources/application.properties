spring.application.name=demo
spring.datasource.url=jdbc:postgresql://localhost:5433/test-person
spring.datasource.username=test_oop
spring.datasource.password=test_oop
spring.sql.init.platform=postgres
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8080

jwt.secret=${JWT_SECRET}

# Email configuration (configure via environment variables or replace with your credentials)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# LLM provider configuration.
# Default: Google Gemini via its OpenAI-compatible endpoint (free tier).
#   - Get a key at https://aistudio.google.com/apikey
#   - Free tier: 1,500 req/day on gemini-2.5-flash
#
# To switch providers, override LLM_BASE_URL and LLM_MODEL via env vars.
# Examples:
#   Groq      : LLM_BASE_URL=https://api.groq.com/openai/v1
#               LLM_MODEL=llama-3.3-70b-versatile
#   OpenRouter: LLM_BASE_URL=https://openrouter.ai/api/v1
#               LLM_MODEL=meta-llama/llama-3.3-70b-instruct:free
#   Ollama    : LLM_BASE_URL=http://localhost:11434/v1
#               LLM_MODEL=llama3.1:8b   (note: needs format=json, see code comment)
llm.api-key=${LLM_API_KEY}
llm.model=${LLM_MODEL:gemini-3.1-flash-lite}
llm.base-url=${LLM_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai}
llm.timeout-seconds=${LLM_TIMEOUT_SECONDS:60}
# Per-user rate limit for /assistant/recommend.
# capacity = number of requests allowed per refill window.
# refill-period = ISO-8601 duration; PT1H = one hour, PT10M = 10 minutes, etc.
assistant.ratelimit.capacity=${ASSISTANT_RATELIMIT_CAPACITY:5}
assistant.ratelimit.refill-period=${ASSISTANT_RATELIMIT_PERIOD:PT1H}