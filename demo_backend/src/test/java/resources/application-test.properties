spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

jwt.secret=P1q7hGFR7haMJwHez66kwIoM5gmsNDrykfg8oxgzKm9

# Disable mail auto-configuration in tests
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Dummy LLM config for tests that don't hit a real provider.
# Real-API integration tests read LLM_API_KEY directly from the environment.
llm.api-key=${LLM_API_KEY:test-key-not-used}
llm.model=gemini-3.1-flash-lite
llm.base-url=https://generativelanguage.googleapis.com/v1beta/openai
llm.timeout-seconds=60
# Same rate-limit defaults as production. Integration tests reset buckets
# in @BeforeEach so they start fresh ? see ProjectAssistantControllerIntegrationTests.
assistant.ratelimit.capacity=5
assistant.ratelimit.refill-period=PT1H